<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>FleetWizards - Car Rental Management</title>
    <meta name="description" content="The operating system for car rental businesses. Manage your fleet, contracts, clients, invoices, and maintenance from one powerful platform." />

    <!-- Non-blocking font load: preload trick so fonts never block render -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    </noscript>

    <!-- Inline loading indicator so users see something while JS parses -->
    <style>
      #root-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        z-index: 9999;
      }
      #root-loader.hidden { display: none; }
      .root-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #e5e7eb;
        border-top-color: #2563eb;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>

  <body>
    <div id="root-loader">
      <div class="root-spinner"></div>
    </div>
    <div id="root"></div>
    <script>
      // Hide the loader once React mounts
      document.addEventListener('DOMContentLoaded', function() {
        var observer = new MutationObserver(function() {
          var root = document.getElementById('root');
          if (root && root.children.length > 0) {
            var loader = document.getElementById('root-loader');
            if (loader) loader.classList.add('hidden');
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true });
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
